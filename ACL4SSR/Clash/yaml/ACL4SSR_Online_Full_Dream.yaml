tun:
  enable: true
  stack: system
  strict-route: false
  auto-route: true
  dns-hijack: 
    - any:53
  mtu: 1500
  disable-icmp-forwarding: true
  device: Mihomo
  auto-detect-interface: true

dns:
  enable: true
  ipv6: false
  prefer-h3: false
  # 模式 redir-host 或 fake-ip
  enhanced-mode: fake-ip
  use-hosts: true
  use-system-hosts: true
  respect-rules: true
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 119.29.29.29
    - 223.5.5.5
  nameserver:
    - https://doh.pub/dns-query
    #- https://223.5.5.5/dns-query
    - https://dns.alidns.com/dns-query
  #fallback:
  #  - https://dns.cloudflare.com/dns-query
  #  - https://public.dns.iij.jp/dns-query
  #  - https://dns.google/dns-query
  proxy-server-nameserver:
    - https://doh.pub/dns-query
    #- https://223.5.5.5/dns-query
    - https://dns.alidns.com/dns-query

  fake-ip-filter:
    - "geosite:private"
    #- "geosite:cn"
    - "+.lan"
    - "+.local"
    - "+.arpa"
    - "time.*.com"
    - "ntp.*.com"
    - "+.market.xiaomi.com"
    - "localhost.ptlogin2.qq.com"
    - "+.msftncsi.com"
    - "www.msftconnecttest.com"

  #fallback-filter:
  #  domain:
  #    - "+.google.com"
  #    - "+.facebook.com"
  #    - "+.youtube.com"
  #  geoip: true
  #  geoip-code: "CN"
  #  ipcidr:
  #    - "240.0.0.0/4"
  #    - "0.0.0.0/32"

  nameserver-policy:
    "geosite:cn":
      - "https://doh.pub/dns-query"
      - "https://dns.alidns.com/dns-query"
    "geosite:geolocation-!cn":
      - "https://cloudflare-dns.com/dns-query"
      - "https://dns.google/dns-query"
    #"geosite:gfw":
     # - "https://cloudflare-dns.com/dns-query"
      #- "https://dns.google/dns-query"
    #"geosite:cn,private":
    #  - "https://doh.pub/dns-query"
    #  - "https://dns.alidns.com/dns-query"
    #"geoip:cn,private":
    #  - "https://doh.pub/dns-query"
    #  - "https://dns.alidns.com/dns-query"
    #"rule-set:MyDirect":
    #  - "https://doh.pub/dns-query"
    #  - "https://dns.alidns.com/dns-query"  

