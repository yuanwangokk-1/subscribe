proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies:
      - ♻️ 自动选择
      - 🚀 手动切换1
      - 🇺🇲 美国自动
      - 🇭🇰 香港自动
      - 🇨🇳 台湾自动
      - 🇸🇬 狮城自动
      - 🇯🇵 日本自动
      - DIRECT
  - name: 🚀 手动切换1
    include-all: true
    type: select
  - name: ♻️ 自动选择
    include-all: true
    type: url-test
    url: https://cp.cloudflare.com
    interval: 300
    tolerance: 200
    lazy: true
    timeout: 5000
    max-failed-times: 5

  - name: 🌍 国外媒体
