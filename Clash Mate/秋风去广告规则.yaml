# ==================== 锚点定义 ====================
pr: &pr
  type: select
  proxies:
    - 节点选择
    - 香港
    - 台湾
    - 日本
    - 新加坡
    - 美国
    - 其它地区
    - 自动选择
    - DIRECT

p: &p
  type: http
  interval: 3600
  health-check:
    enable: true
    url: https://cp.cloudflare.com
    interval: 300
    timeout: 1000
    tolerance: 100

use: &use
  type: url-test
  use:
    - Aries

# ==================== 代理订阅 ====================
proxy-providers:
  Aries:
    <<: *p
    url: "URL"

# ==================== 规则集 ====================
rule-providers:
  AWAvenue-Ads:
    type: http
    behavior: domain
    format: yaml
    path: ./rule_provider/AWAvenue-Ads.yaml
    url: "https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/refs/heads/main/Filters/AWAvenue-Ads-Rule-Clash-Classical.yaml"
    interval: 600

# ==================== 基础设置 ====================
mode: rule
ipv6: true
log-level: info
allow-lan: true
mixed-port: 7890
unified-delay: true
tcp-concurrent: true
external-controller: :9090
geodata-mode: true
find-process-mode: strict
keep-alive-interval: 1800
global-client-fingerprint: random

# ==================== GEO数据 ====================
geox-url:
  geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat"
  geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country.mmdb"

# ==================== 配置存储 ====================
profile:
  store-selected: true
  store-fake-ip: true

# ==================== NTP时间同步 ====================
ntp:
  enable: true
  write-to-system: false
  server: time.apple.com
  port: 123
  interval: 30

# ==================== 流量嗅探 ====================
sniffer:
  enable: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true

# ==================== TUN虚拟网卡 ====================
tun:
  enable: false
  stack: system
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-detect-interface: true

# ==================== DNS配置 ====================
dns:
  enable: true
  listen: :1053
  ipv6: true
  enhanced-mode: redir-host
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter:
    - '*'
    - '+.lan'
    - '+.local'
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 114.114.114.114
    - '[2402:4e00::]'
    - '[2400:3200::1]'
  nameserver:
    - 'tls://8.8.4.4'
    - 'tls://1.0.0.1'
    - 'tls://[2001:4860:4860::8844]'
    - 'tls://[2606:4700:4700::1001]'
  proxy-server-nameserver:
    - https://doh.pub/dns-query
  nameserver-policy:
    "geosite:cn,private":
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query
    "geosite:!cn,!private":
      - "tls://dns.google"
      - "tls://cloudflare-dns.com"

# ==================== 代理组 ====================
proxy-groups:
  - name: 节点选择
    type: select
    proxies:
      - 自动选择
      - 香港
      - 台湾
      - 日本
      - 新加坡
      - 美国
      - 其它地区
      - DIRECT

  - name: dns
    <<: *pr

  - name: 广告拦截
    type: select
    proxies:
      - REJECT
      - DIRECT
      - 节点选择

  - name: 香港
    <<: *use
    filter: "(?i)港|hk|hongkong|hong kong"

  - name: 台湾
    <<: *use
    filter: "(?i)台|tw|taiwan"

  - name: 日本
    <<: *use
    filter: "(?i)日本|jp|japan"

  - name: 美国
    <<: *use
    filter: "(?i)美|us|unitedstates|united states"

  - name: 新加坡
    <<: *use
    filter: "(?i)(新|sg|singapore)"

  - name: 其它地区
    <<: *use
    filter: "(?i)^(?!.*(?:🇭🇰|🇯🇵|🇺🇸|🇸🇬|🇨🇳|港|hk|hongkong|台|tw|taiwan|日|jp|japan|新|sg|singapore|美|us|unitedstates)).*"

  - name: 自动选择
    <<: *use
    type: url-test
    url: https://cp.cloudflare.com
    interval: 300
    tolerance: 200

# ==================== 规则 ====================
rules:
  - RULE-SET,AWAvenue-Ads,广告拦截
  - MATCH,节点选择
