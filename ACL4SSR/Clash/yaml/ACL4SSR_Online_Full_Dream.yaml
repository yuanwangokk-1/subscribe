      - 🇭🇰 香港自动
      - 🇨🇳 台湾自动
      - 🇸🇬 狮城自动
      - 🇯🇵 日本自动
      - DIRECT
  - name: Ⓜ️ 微软服务
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - 🚀 手动切换1
      - 🇺🇲 美国自动
      - 🇭🇰 香港自动
      - 🇨🇳 台湾自动
      - 🇸🇬 狮城自动
      - 🇯🇵 日本自动
      - DIRECT
  - name: 🍎 苹果服务
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - 🚀 手动切换1
      - 🇺🇲 美国自动
      - 🇭🇰 香港自动
      - 🇨🇳 台湾自动
      - 🇸🇬 狮城自动
      - 🇯🇵 日本自动
      - DIRECT
  - name: 🎮 游戏平台
    include-all: true
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - 🚀 手动切换1
      - 🇺🇲 美国自动
      - 🇭🇰 香港自动
      - 🇨🇳 台湾自动
      - 🇸🇬 狮城自动
      - 🇯🇵 日本自动
      - DIRECT
  - name: 🔑 RemoteSSH
    include-all: true
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - 🚀 手动切换1
      - 🇺🇲 美国自动
      - 🇭🇰 香港自动
      - 🇨🇳 台湾自动
      - 🇸🇬 狮城自动
      - 🇯🇵 日本自动
      - DIRECT    
  - name: 🎯 全球直连
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择
      - ♻️ 自动选择
      - 🚀 手动切换1
      - 🇺🇲 美国自动
      - 🇭🇰 香港自动
      - 🇨🇳 台湾自动
      - 🇸🇬 狮城自动
      - 🇯🇵 日本自动
  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - 🚀 手动切换1
      - 🇺🇲 美国自动
      - 🇭🇰 香港自动
      - 🇨🇳 台湾自动
      - 🇸🇬 狮城自动
      - 🇯🇵 日本自动
      - DIRECT

  - name: 🇭🇰 香港自动
    include-all: true
    filter: (?i)香港|港|HK|hk|Hong Kong|HongKong|hongkong
    type: url-test
    url: https://cp.cloudflare.com
    interval: 300
    tolerance: 150
    lazy: true
    timeout: 5000
    max-failed-times: 5
  - name: 🇨🇳 台湾自动
    include-all: true
    filter: (?i)台|新北|彰化|TW|Taiwan
    type: url-test
    url: https://cp.cloudflare.com
    interval: 300
    tolerance: 150
    lazy: true
    timeout: 5000
    max-failed-times: 5
  - name: 🇺🇲 美国自动
    include-all: true
    filter: (?i)(?:美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|(?<![A-Za-z])US(?:(?=\s*x\d)|(?![A-Za-z]))|USA|UnitedStates|United States|America|California)
    type: url-test
    url: https://cp.cloudflare.com
    interval: 300
    tolerance: 250
    lazy: true
    timeout: 5000
    max-failed-times: 5
  - name: 🇯🇵 日本自动
    include-all: true
    filter: (?i)日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan
    type: url-test
    url: https://cp.cloudflare.com
    interval: 300
    tolerance: 150
    lazy: true
    timeout: 5000
    max-failed-times: 5
  - name: 🇸🇬 狮城自动
    include-all: true
    filter: (?i)新加坡|坡|狮城|SG|Singapore
    type: url-test
    url: https://cp.cloudflare.com
    interval: 300
    tolerance: 150
    lazy: true
    timeout: 5000
    max-failed-times: 5

